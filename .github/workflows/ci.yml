name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: trellis
          POSTGRES_PASSWORD: trellis
          POSTGRES_DB: trellis
        ports:
          - 5440:5432
        options: >-
          --health-cmd "pg_isready -U trellis -d trellis"
          --health-interval 5s --health-timeout 5s --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Typecheck (server)
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run
      - name: Typecheck (web)
        run: cd web && npm ci && npx tsc --noEmit
